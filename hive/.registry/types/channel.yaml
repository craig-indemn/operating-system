type: channel
fields:
  name: { type: string, required: true }
  platform: { type: ref, target: platform }
  brand: { type: ref, target: brand }
  url: { type: string }
  domains: { type: list, required: true }
  tags: { type: list }
  status: { type: enum, values: [active, inactive, archived] }
display: name
